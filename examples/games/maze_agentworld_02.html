<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Robot-Filled Maze Shooter</title>
<style>
  body {
    background: #111;
    color: #ccc;
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
  }
  #game-container {
    position: relative;
    border: 4px solid #333;
    box-shadow: 0 0 20px #000;
  }
  canvas {
    display: block;
    background: #000;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #scanlines {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0.15),
      rgba(0, 0, 0, 0.15) 1px,
      transparent 1px,
      transparent 2px
    );
    pointer-events: none;
  }
  #controls {
    margin-top: 10px;
    font-size: 14px;
    text-align: center;
    color: #888;
  }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game" width="480" height="640"></canvas>
  <div id="scanlines"></div>
</div>
<div id="controls">
  Controls: Arrow Keys / WASD to move • Space to shoot • Shift/Z/X for secondary (not used) • R to restart
</div>

<script>
// Constants block
const CANVAS_WIDTH = 480;
const CANVAS_HEIGHT = 640;
const TILE_SIZE = 32;
const COLS = 15;
const ROWS = 20;
const PLAYER_SPEED = 3;
const BULLET_SPEED = 6;
const ROBOT_SPEED = 1.5;
const COLORS = {
  bg: '#0f0f1a',
  wall: '#4a4a6a',
  wallHighlight: '#6a6a9a',
  player: '#00ff00',
  robot: '#ff3333',
  bullet: '#ffff00',
  exit: '#00ffff',
  hud: '#ffffff'
};

// State block
let canvas, ctx;
let gameState = 'start'; // 'start', 'play', 'over', 'win'
let score = 0;
let lives = 3;
let level = 1;
let player = { x: 0, y: 0, dir: 0, cooldown: 0 };
let bullets = [];
let robots = [];
let map = [];
let exitPos = { x: 0, y: 0 };
let keys = new Set();
let lastTime = 0;

// Audio context
let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playSound(type) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  if (type === 'shoot') {
    osc.type = 'square';
    osc.frequency.setValueAtTime(800, now);
    osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
    gain.gain.setValueAtTime(0.1, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
    osc.start(now);
    osc.stop(now + 0.1);
  } else if (type === 'hit') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, now);
    osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
    gain.gain.setValueAtTime(0.1, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
    osc.start(now);
    osc.stop(now + 0.2);
  } else if (type === 'exit') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400, now);
    osc.frequency.exponentialRampToValueAtTime(800, now + 0.3);
    gain.gain.setValueAtTime(0.1, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
    osc.start(now);
    osc.stop(now + 0.3);
  }
}

// Input handler
document.addEventListener('keydown', e => {
  keys.add(e.key.toLowerCase());
  if (gameState === 'start' && e.key === ' ') {
    initAudio();
    startGame();
  }
  if (gameState === 'over' && e.key.toLowerCase() === 'r') {
    startGame();
  }
  if (gameState === 'play' && e.key === ' ') {
    shootBullet();
  }
});

document.addEventListener('keyup', e => {
  keys.delete(e.key.toLowerCase());
});

function startGame() {
  score = 0;
  lives = 3;
  level = 1;
  initLevel();
  gameState = 'play';
}

function initLevel() {
  // Generate maze (simplified: grid with walls and open spaces)
  map = [];
  for (let r = 0; r < ROWS; r++) {
    let row = [];
    for (let c = 0; c < COLS; c++) {
      // Borders
      if (r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1) {
        row.push(1);
      } else {
        // Random walls but ensure playability
        let isWall = Math.random() < 0.2;
        // Ensure start area clear
        if (r < 3 && c < 3) isWall = false;
        // Ensure exit area clear (bottom right)
        if (r > ROWS - 4 && c > COLS - 4) isWall = false;
        row.push(isWall ? 1 : 0);
      }
    }
    map.push(row);
  }

  // Player start top-left
  player.x = 1.5 * TILE_SIZE;
  player.y = 1.5 * TILE_SIZE;
  player.dir = 0;
  player.cooldown = 0;

  // Exit bottom-right
  exitPos = { x: (COLS - 2) * TILE_SIZE, y: (ROWS - 2) * TILE_SIZE };

  // Robots
  robots = [];
  let robotCount = 3 + level * 2;
  for (let i = 0; i < robotCount; i++) {
    let rx, ry;
    do {
      rx = Math.floor(Math.random() * (COLS - 2)) + 1;
      ry = Math.floor(Math.random() * (ROWS - 2)) + 1;
    } while (map[ry][rx] === 1 || (rx < 3 && ry < 3) || (rx > COLS - 4 && ry > ROWS - 4));
    robots.push({
      x: rx * TILE_SIZE + TILE_SIZE / 2,
      y: ry * TILE_SIZE + TILE_SIZE / 2,
      dir: Math.floor(Math.random() * 4),
      cooldown: 0
    });
  }

  bullets = [];
}

function shootBullet() {
  if (player.cooldown > 0) return;
  let bx = player.x + TILE_SIZE / 2;
  let by = player.y + TILE_SIZE / 2;
  let bdx = 0, bdy = 0;
  if (player.dir === 0) bdy = -BULLET_SPEED;
  else if (player.dir === 1) bdy = BULLET_SPEED;
  else if (player.dir === 2) bdx = -BULLET_SPEED;
  else if (player.dir === 3) bdx = BULLET_SPEED;

  bullets.push({ x: bx, y: by, dx: bdx, dy: bdy });
  player.cooldown = 10;
  playSound('shoot');
}

function updatePlayer(dt) {
  let dx = 0, dy = 0;
  if (keys.has('arrowup') || keys.has('w')) { dy = -PLAYER_SPEED; player.dir = 0; }
  else if (keys.has('arrowdown') || keys.has('s')) { dy = PLAYER_SPEED; player.dir = 1; }
  else if (keys.has('arrowleft') || keys.has('a')) { dx = -PLAYER_SPEED; player.dir = 2; }
  else if (keys.has('arrowright') || keys.has('d')) { dx = PLAYER_SPEED; player.dir = 3; }

  // Move X
  let nx = player.x + dx;
  if (!isWall(nx + TILE_SIZE / 2, player.y + TILE_SIZE / 2) && !isWall(nx - TILE_SIZE / 2, player.y + TILE_SIZE / 2)) {
    player.x = nx;
  }
  // Move Y
  let ny = player.y + dy;
  if (!isWall(player.x + TILE_SIZE / 2, ny + TILE_SIZE / 2) && !isWall(player.x + TILE_SIZE / 2, ny - TILE_SIZE / 2)) {
    player.y = ny;
  }

  // Clamp
  player.x = Math.max(TILE_SIZE / 2, Math.min(player.x, (COLS - 1) * TILE_SIZE - TILE_SIZE / 2));
  player.y = Math.max(TILE_SIZE / 2, Math.min(player.y, (ROWS - 1) * TILE_SIZE - TILE_SIZE / 2));

  if (player.cooldown > 0) player.cooldown--;
}

function isWall(cx, cy) {
  let c = Math.floor(cx / TILE_SIZE);
  let r = Math.floor(cy / TILE_SIZE);
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return true;
  return map[r][c] === 1;
}

function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    let b = bullets[i];
    b.x += b.dx;
    b.y += b.dy;
    if (isWall(b.x, b.y)) {
      bullets.splice(i, 1);
      playSound('hit');
      continue;
    }
    // Check robot hits
    for (let j = robots.length - 1; j >= 0; j--) {
      let rob = robots[j];
      let dist = Math.hypot(b.x - rob.x, b.y - rob.y);
      if (dist < TILE_SIZE / 2) {
        robots.splice(j, 1);
        bullets.splice(i, 1);
        score += 100;
        playSound('hit');
        break;
      }
    }
    // Remove if out of bounds
    if (b.x < 0 || b.x > CANVAS_WIDTH || b.y < 0 || b.y > CANVAS_HEIGHT) {
      bullets.splice(i, 1);
    }
  }
}

function updateRobots(dt) {
  for (let rob of robots) {
    // Simple AI: move towards player or random
    let dx = player.x - rob.x;
    let dy = player.y - rob.y;
    let moveX = 0, moveY = 0;
    if (Math.abs(dx) > Math.abs(dy)) {
      moveX = dx > 0 ? ROBOT_SPEED : -ROBOT_SPEED;
    } else {
      moveY = dy > 0 ? ROBOT_SPEED : -ROBOT_SPEED;
    }

    let nx = rob.x + moveX;
    let ny = rob.y + moveY;
    if (!isWall(nx, rob.y)) rob.x = nx;
    if (!isWall(rob.x, ny)) rob.y = ny;

    // Collision with player
    let dist = Math.hypot(player.x - rob.x, player.y - rob.y);
    if (dist < TILE_SIZE * 0.8) {
      lives--;
      playSound('hit');
      if (lives <= 0) {
        gameState = 'over';
      } else {
        // Reset player pos
        player.x = 1.5 * TILE_SIZE;
        player.y = 1.5 * TILE_SIZE;
      }
    }
  }
}

function checkExit() {
  let dist = Math.hypot(player.x - (exitPos.x + TILE_SIZE / 2), player.y - (exitPos.y + TILE_SIZE / 2));
  if (dist < TILE_SIZE) {
    playSound('exit');
    level++;
    initLevel();
  }
}

// Draw functions
function drawMap() {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      let x = c * TILE_SIZE;
      let y = r * TILE_SIZE;
      if (map[r][c] === 1) {
        ctx.fillStyle = COLORS.wall;
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
        ctx.fillStyle = COLORS.wallHighlight;
        ctx.fillRect(x, y, TILE_SIZE, 4);
        ctx.fillRect(x, y, 4, TILE_SIZE);
      } else {
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
      }
    }
  }

  // Exit
  let ex = exitPos.x;
  let ey = exitPos.y;
  ctx.fillStyle = COLORS.exit;
  ctx.fillRect(ex + 4, ey + 4, TILE_SIZE - 8, TILE_SIZE - 8);
  ctx.fillStyle = '#008888';
  ctx.fillRect(ex + 8, ey + 8, TILE_SIZE - 16, TILE_SIZE - 16);
}

function drawPlayer() {
  let px = player.x - TILE_SIZE / 2;
  let py = player.y - TILE_SIZE / 2;
  ctx.fillStyle = COLORS.player;
  ctx.fillRect(px + 4, py + 4, TILE_SIZE - 8, TILE_SIZE - 8);
  // Direction indicator
  ctx.fillStyle = '#00aa00';
  if (player.dir === 0) ctx.fillRect(px + 12, py + 4, 8, 4);
  else if (player.dir === 1) ctx.fillRect(px + 12, py + 24, 8, 4);
  else if (player.dir === 2) ctx.fillRect(px + 4, py + 12, 4, 8);
  else if (player.dir === 3) ctx.fillRect(px + 24, py + 12, 4, 8);
}

function drawRobots() {
  for (let rob of robots) {
    let rx = rob.x - TILE_SIZE / 2;
    let ry = rob.y - TILE_SIZE / 2;
    ctx.fillStyle = COLORS.robot;
    ctx.fillRect(rx + 4, ry + 4, TILE_SIZE - 8, TILE_SIZE - 8);
    // Eyes
    ctx.fillStyle = '#ffff00';
    ctx.fillRect(rx + 8, ry + 10, 6, 6);
    ctx.fillRect(rx + 18, ry + 10, 6, 6);
  }
}

function drawBullets() {
  ctx.fillStyle = COLORS.bullet;
  for (let b of bullets) {
    ctx.fillRect(b.x - 3, b.y - 3, 6, 6);
  }
}

function drawHUD() {
  ctx.fillStyle = COLORS.hud;
  ctx.font = '16px Courier New';
  ctx.fillText(`SCORE: ${score}`, 10, 24);
  ctx.fillText(`LIVES: ${lives}`, 10, 46);
  ctx.fillText(`LEVEL: ${level}`, 10, 68);
}

function drawStartScreen() {
  drawMap();
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
  ctx.fillStyle = COLORS.player;
  ctx.font = '28px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('ROBOT-FILLED MAZE', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 40);
  ctx.fillText('SHOOTER', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 10);
  ctx.fillStyle = COLORS.hud;
  ctx.font = '16px Courier New';
  ctx.fillText('PRESS SPACE TO START', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 30);
  ctx.fillStyle = '#888';
  ctx.font = '12px Courier New';
  ctx.fillText('Robot-Filled Maze Shooter — original-genre homage, no copyrighted IP', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 70);
  ctx.textAlign = 'left';
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
  ctx.fillStyle = '#ff3333';
  ctx.font = '28px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 - 20);
  ctx.fillStyle = COLORS.hud;
  ctx.font = '16px Courier New';
  ctx.fillText(`FINAL SCORE: ${score}`, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 20);
  ctx.fillText('PRESS R TO RESTART', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 60);
  ctx.textAlign = 'left';
}

// Loop
function loop(timestamp) {
  let dt = timestamp - lastTime;
  lastTime = timestamp;

  ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

  if (gameState === 'start') {
    drawStartScreen();
  } else if (gameState === 'play') {
    updatePlayer(dt);
    updateBullets(dt);
    updateRobots(dt);
    checkExit();

    drawMap();
    drawBullets();
    drawRobots();
    drawPlayer();
    drawHUD();

    if (lives <= 0) {
      gameState = 'over';
    }
  } else if (gameState === 'over') {
    drawMap();
    drawRobots();
    drawPlayer();
    drawHUD();
    drawGameOver();
  }

  requestAnimationFrame(loop);
}

// Init
window.addEventListener('load', () => {
  canvas = document.getElementById('game');
  ctx = canvas.getContext('2d');
  lastTime = performance.now();
  requestAnimationFrame(loop);
});
</script>
</body>
</html>
